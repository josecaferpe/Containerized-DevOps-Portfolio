name: 🛡️ CI - Quality Gate

# ¿Cuándo se ejecuta?
# 1. Cuando haces push a la rama main
# 2. Cuando abres un Pull Request hacia main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-code:
    runs-on: ubuntu-latest # GitHub nos presta una máquina Linux gratis

    steps:
    # 1. Descargar tu código en la máquina virtual
    - name: 📥 Descargar código (Checkout)
      uses: actions/checkout@v3

    # 2. Instalar Python 3.9
    - name: 🐍 Instalar Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.9"

    # 3. Instalar herramientas de revisión
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    # 4. Ejecutar el análisis (Linter)
    # E9,F63,F7,F82 = Errores de sintaxis graves (el código no funcionaría)
    # --exit-zero = Si hay errores de estilo leves, avisa pero no marques error rojo
    - name: 🔍 Analizar con Flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics